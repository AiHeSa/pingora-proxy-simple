# Pingora 代理配置

servers:
  # file-panel 前端 + API :7000
  - listen: "0.0.0.0:7000"
    name: "file-panel"
    locations:
      - path: "/api"
        upstream: "127.0.0.1:7001"
      - path: "/"
        static_root: "/root/webapps/file-panel"

  # for-my-love-memory 后端 API :7002
  - listen: "0.0.0.0:7002"
    name: "for-my-love-memory-api"
    locations:
      - path: "/"
        upstream: "127.0.0.1:3000"

  # vite-project 前端 :5174
  - listen: "0.0.0.0:5174"
    name: "vite-project"
    locations:
      - path: "/"
        static_root: "/root/webapps/vite-project-test-v1"

  # 默认页面 :80
  - listen: "0.0.0.0:80"
    name: "default"
    locations:
      - path: "/"
        static_root: "/var/www/html"
